<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>PDF Merge Tool - ToolVerse</title>


<meta name="description"
content="Merge multiple PDF files online quickly and easily with ToolVerse PDF Merge Tool.">


<link rel="stylesheet" href="../assets/css/variables.css">

<link rel="stylesheet" href="../assets/css/tool-page.css">


</head>


<body>


<header class="tool-header">

<a href="../index.html">

⚡ ToolVerse

</a>

</header>




<section class="tool-section">


<div class="tool-container">


<h1>

PDF Merge Tool

</h1>


<p>

Combine multiple PDF files into one document.

</p>




<div class="compress-box">



<input 

type="file"

id="pdfInput"

accept="application/pdf"

multiple>



<div id="fileList">


</div>



<button id="mergeBtn">

Merge PDF

</button>



<a id="downloadBtn"
download="merged-file.pdf">

Download PDF

</a>



</div>


</div>


</section>



<!-- PDF Library -->

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>


<script src="../assets/js/pdf-merge.js"></script>



</body>

</html>
