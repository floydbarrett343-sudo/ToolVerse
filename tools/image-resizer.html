<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Image Resizer Online - ToolVerse</title>


<meta name="description" content="Resize images online easily. Change image width and height with our free image resizer tool.">


<link rel="stylesheet" href="../assets/css/variables.css">

<link rel="stylesheet" href="../assets/css/tool-page.css">


</head>


<body>


<header class="tool-header">

<a href="../index.html">

⚡ ToolVerse

</a>

</header>




<section class="tool-section">


<div class="tool-container">


<h1>

Image Resizer

</h1>


<p>

Resize your images to any dimension instantly.

</p>




<div class="compress-box">


<input 
type="file"
id="imageInput"
accept="image/*">



<img 
id="preview"
alt="Image Preview">





<div class="resize-controls">


<label>

Width

</label>


<input 
type="number"
id="width">



<label>

Height

</label>


<input 
type="number"
id="height">


</div>




<button id="resizeBtn">

Resize Image

</button>




<a id="downloadBtn"
download="resized-image.png">

Download Image

</a>



</div>


</div>


</section>





<script src="../assets/js/image-resizer.js"></script>


</body>

</html>
